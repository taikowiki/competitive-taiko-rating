{{template "header.html" .}}

<h1>S{{.season}} <span data-i18n="final_ranking">최종 랭킹</span></h1>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th data-i18n="rank">순위</th>
                <th data-i18n="taiko_no">태고 번호</th>
                <th data-i18n="rating">레이팅</th>
            </tr>
        </thead>
        <tbody>
            {{range .rankings}}
            <tr>
                <td>{{.Ranking}}</td>
                <td><a href="/player/{{.TaikoNo}}">{{.TaikoNo}}</a></td>
                <td>{{printf "%.2f" .Rating}}</td>
            </tr>
            {{else}}
            <tr>
                <td colspan="3" data-i18n="no_data">데이터가 없습니다.</td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>

<div class="actions">
    <a href="/ranking/season" class="btn secondary" data-i18n="back_to_season_list">시즌 목록으로</a>
</div>

{{template "footer.html" .}}
