{{template "header.html" .}}

<h1 data-i18n="overall_rating_ranking">전체 레이팅 랭킹</h1>

<div class="actions">
    <a href="/ranking/season" class="btn" data-i18n="view_past_rankings">역대 랭킹 보기</a>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th data-i18n="rank">순위</th>
                <th data-i18n="taiko_no">태고 번호</th>
                <th data-i18n="rating">레이팅</th>
            </tr>
        </thead>
        <tbody>
            {{range .rankings}}
            <tr>
                <td>{{.Ranking}}</td>
                <td><a href="/player/{{.TaikoNo}}">{{.TaikoNo}}</a></td>
                <td>{{printf "%.2f" .Rating}}</td>
            </tr>
            {{else}}
            <tr>
                <td colspan="3" data-i18n="no_data">데이터가 없습니다.</td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>

{{template "footer.html" .}}
