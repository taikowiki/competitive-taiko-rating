{{template "header.html" .}}

<h1 data-i18n="season_history_list">시즌 기록 목록</h1>
<p data-i18n="select_season">기록을 확인할 시즌을 선택해주세요.</p>

<div class="grid">
    {{range .seasons}}
    <a href="/history/{{.}}" class="link-wrapper">
        <div class="card link-card">
            <h3>S{{.}}</h3>
            <p data-i18n="view_session_list">세션 목록 보기</p>
        </div>
    </a>
    {{else}}
    <p data-i18n="no_recorded_season">기록된 시즌이 없습니다.</p>
    {{end}}
</div>

<div class="actions">
    <a href="/" class="btn secondary" data-i18n="back_to_home">홈으로</a>
</div>

{{template "footer.html" .}}
